name: 📺 Daily YouTube Shorts Bot

on:
  # Щодня о 10:00 за Київським часом (07:00 UTC)
  schedule:
    - cron: "0 7 * * *"

  # Ручний запуск через кнопку в GitHub
  workflow_dispatch:
    inputs:
      debug:
        description: "Режим налагодження (не публікувати)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  generate-short:
    name: Generate & Upload YouTube Short
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # ── 1. Отримання коду ─────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ─────────────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Системні залежності ────────────────────────────
      - name: 📦 Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-dejavu-core \
            fonts-dejavu \
            fonts-liberation
          echo "✅ ffmpeg and fonts installed"

      # ── 4. Python пакети ──────────────────────────────────
      - name: 📦 Install Python packages
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          echo "✅ Python залежності встановлено"

      # ── 5. Configure git for commits ──────────────────────
      - name: 🔧 Configure git
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "YouTube News Bot"

      # ── 6. Run News Bot ──────────────────────────────────────
      - name: 🚀 Run News Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          python main.py

      # ── 7. Push changes ──────────────────────────────────────
      - name: 📤 Push used_videos.txt
        if: success()
        run: |
          git push origin || echo "No changes to push"

      # ── 8. Success message ──────────────────────────────────
      - name: ✅ Done
        if: success()
        run: echo "🎉 Video successfully published to YouTube!"

      # ── 9. Failure message ──────────────────────────────────
      - name: ❌ Failed
        if: failure()
        run: |
          echo "❌ Bot finished with error"
          echo "Check logs above for details"
